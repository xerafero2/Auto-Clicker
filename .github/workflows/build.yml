name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download & Install Gradle 8.10.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          echo "$(pwd)/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Create gradle.properties (enable AndroidX)
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties

      - name: Build debug APK (with stacktrace)
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-android
          path: app/build/outputs/apk/debug/app-debug.apk
